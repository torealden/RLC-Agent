# ============================================================================
# Gold View Factory — FAS Balance Sheet Views
# ============================================================================
# Creates gold.fas_us_*_balance_sheet views for commodities that exist in
# bronze.fas_psd but don't yet have gold views.
#
# Run:  python scripts/ollama/task_runner.py scripts/ollama/jobs/gold_views_balance_sheets.yaml
# Test: python scripts/ollama/task_runner.py scripts/ollama/jobs/gold_views_balance_sheets.yaml --dry-run
# ============================================================================

model: "qwen3-coder:30b"
temperature: 0.05  # Very low — we want deterministic template replication

system_prompt: |
  You are a SQL assistant. You generate PostgreSQL views by following templates exactly.
  Rules:
  - Output ONLY the SQL. No explanations, no markdown, no commentary.
  - Do not invent column names. Use only columns from the template.
  - Preserve the exact formatting and style of the template.
  - The only things you change are: view name, commodity filter, and demand columns as instructed.

tasks:
  # ── Oilseeds that use "crush" in demand ──────────────────────────

  - name: fas_us_canola_balance_sheet
    output_file: views/fas_us_canola_balance_sheet.sql
    prompt: |
      Here is a PostgreSQL view for US soybeans:

      DROP VIEW IF EXISTS gold.fas_us_soybeans_balance_sheet;
      CREATE VIEW gold.fas_us_soybeans_balance_sheet AS
      SELECT
          marketing_year,
          report_date,
          'USDA PSD' AS source,
          area_harvested,
          yield,
          beginning_stocks,
          production,
          imports,
          total_supply,
          crush,
          fsi_consumption,
          domestic_consumption,
          exports,
          total_distribution,
          ending_stocks,
          CASE WHEN total_distribution > 0
               THEN ROUND((ending_stocks / total_distribution * 100)::numeric, 1)
               ELSE NULL
          END AS stocks_use_pct,
          unit
      FROM bronze.fas_psd
      WHERE commodity = 'soybeans'
        AND country_code = 'US'
      ORDER BY marketing_year DESC, report_date DESC;

      Create the identical view for canola (rapeseed). Changes:
      - View name: gold.fas_us_canola_balance_sheet
      - commodity filter: 'rapeseed'  (USDA PSD uses 'rapeseed' not 'canola')
      - Keep "crush" in the demand section (canola is an oilseed)
      Output only SQL.
    validation:
      must_contain: ["fas_us_canola_balance_sheet", "rapeseed", "crush"]
      must_not_contain: ["```", "Here is", "Note:"]

