# ============================================================================
# HS Code Reference — silver.trade_commodity_reference INSERT Generator
# ============================================================================
# Parses the HS code concordance file and generates SQL INSERT statements
# for silver.trade_commodity_reference to fill gaps in commodity coverage.
#
# Source: domain_knowledge/data_dictionaries/hs_codes_interactive_concordance_2025.csv
# Pattern: database/migrations/006_add_all_trade_hs_codes.sql
#
# Run:  python scripts/ollama/task_runner.py scripts/ollama/jobs/hs_code_reference.yaml
# Test: python scripts/ollama/task_runner.py scripts/ollama/jobs/hs_code_reference.yaml --dry-run
# ============================================================================

model: "qwen3-coder:30b"
temperature: 0.05

system_prompt: "You generate PostgreSQL INSERT statements. Output ONLY SQL. No explanations."

