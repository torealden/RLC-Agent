# ============================================================================
# Gold View Factory — Global (Non-US) FAS Balance Sheet Views
# ============================================================================
# Creates gold.fas_{country}_{commodity}_balance_sheet views for major
# global producers, exporters, and importers using bronze.fas_psd data.
#
# Run:  python scripts/ollama/task_runner.py scripts/ollama/jobs/gold_views_global.yaml
# Test: python scripts/ollama/task_runner.py scripts/ollama/jobs/gold_views_global.yaml --dry-run
# ============================================================================

model: "qwen3-coder:30b"
temperature: 0.05  # Very low — we want deterministic template replication

system_prompt: |
  You are a SQL assistant. You generate PostgreSQL views by following templates exactly.
  Rules:
  - Output ONLY the SQL. No explanations, no markdown, no commentary.
  - Do not invent column names. Use only columns from the template.
  - Preserve the exact formatting and style of the template.
  - The only things you change are: view name, commodity filter, country_code filter, and demand columns as instructed.

tasks:
  # ════════════════════════════════════════════════════════════════════
  # SOYBEANS — Major global players (oilseed: uses "crush")
  # ════════════════════════════════════════════════════════════════════

  - name: fas_brazil_soybeans_balance_sheet
    output_file: views/fas_brazil_soybeans_balance_sheet.sql
    prompt: |
      Here is a PostgreSQL view for US soybeans:

      DROP VIEW IF EXISTS gold.fas_us_soybeans_balance_sheet;
      CREATE VIEW gold.fas_us_soybeans_balance_sheet AS
      SELECT
          marketing_year,
          report_date,
          'USDA PSD' AS source,
          area_harvested,
          yield,
          beginning_stocks,
          production,
          imports,
          total_supply,
          crush,
          fsi_consumption,
          domestic_consumption,
          exports,
          total_distribution,
          ending_stocks,
          CASE WHEN total_distribution > 0
               THEN ROUND((ending_stocks / total_distribution * 100)::numeric, 1)
               ELSE NULL
          END AS stocks_use_pct,
          unit
      FROM bronze.fas_psd
      WHERE commodity = 'soybeans'
        AND country_code = 'US'
      ORDER BY marketing_year DESC, report_date DESC;

      Create the identical view for Brazil soybeans. Changes:
      - View name: gold.fas_brazil_soybeans_balance_sheet
      - country_code filter: 'BR' (not 'US')
      - commodity filter stays 'soybeans'
      - Keep "crush" in the demand section (soybeans are an oilseed)
      Output only SQL.
    validation:
      must_contain: ["fas_brazil_soybeans_balance_sheet", "soybeans", "crush", "'BR'"]
      must_not_contain: ["```", "Here is", "Note:", "'US'"]

