# ============================================================================
# Country Reconciliation — Trade Country Reference INSERT Generator
# ============================================================================
# Generates SQL INSERT statements for silver.trade_country_reference by having
# the local LLM reconcile country names across Census Bureau, USDA FAS PSD,
# and CONAB/Brazil naming conventions.
#
# The existing 014_trade_reference_tables.sql has basic country data but is
# missing FAS/PSD alternative names and ISO codes. This job produces a
# comprehensive replacement with all cross-references populated.
#
# Run:  python scripts/ollama/task_runner.py scripts/ollama/jobs/country_reconciliation.yaml
# Test: python scripts/ollama/task_runner.py scripts/ollama/jobs/country_reconciliation.yaml --dry-run
# Single region: python scripts/ollama/task_runner.py scripts/ollama/jobs/country_reconciliation.yaml --task 3
# ============================================================================

model: "qwen3-coder:30b"
temperature: 0.1

system_prompt: |
  You generate PostgreSQL INSERT statements for country reference data.
  Output ONLY valid SQL — no markdown, no commentary, no explanations, no code fences.
  Use your knowledge of international naming conventions.
  When uncertain about a country name variant, include a SQL comment on that line.

  IMPORTANT RULES:
  - Census Bureau uses ALL CAPS country names (e.g., "KOREA, SOUTH", "CONGO (KINSHASA)")
  - FAS PSD uses Title Case with commas (e.g., "Korea, Republic of", "Congo, Democratic Republic of")
  - CONAB/Brazil uses Portuguese names (e.g., "Coreia do Sul", "Congo")
  - ISO codes must be standard ISO 3166-1 alpha-2 and alpha-3
  - Leave spreadsheet_row as NULL
  - Use the exact column order shown in the template
  - Every INSERT must use ON CONFLICT to be safely re-runnable

tasks:

  # ════════════════════════════════════════════════════════════════════
  # TASK 1: EU-27 Member States
  # ════════════════════════════════════════════════════════════════════

  - name: region_01_eu27
    output_file: sql/country_ref_01_eu27.sql
    prompt: |
      Here is the schema for silver.trade_country_reference:

      CREATE TABLE silver.trade_country_reference (
          id SERIAL PRIMARY KEY,
          country_code VARCHAR(10),           -- Census Bureau country code (can be NULL if unknown)
          country_name VARCHAR(100) NOT NULL,  -- Census Bureau name (ALL CAPS) - primary key for matching
          country_name_alt VARCHAR(100),       -- USDA FAS PSD alternative name (Title Case)
          iso2_code VARCHAR(2),                -- ISO 3166-1 alpha-2 (e.g., DE, FR)
          iso3_code VARCHAR(3),                -- ISO 3166-1 alpha-3 (e.g., DEU, FRA)
          region VARCHAR(50) NOT NULL,         -- Regional grouping
          region_sort_order INT NOT NULL,      -- Order of regions
          country_sort_order INT NOT NULL,     -- Order within region (alphabetical)
          spreadsheet_row INT,                 -- NULL for now
          is_regional_total BOOLEAN DEFAULT FALSE,
          is_active BOOLEAN DEFAULT TRUE,
          notes TEXT,
          created_at TIMESTAMPTZ DEFAULT NOW(),
          updated_at TIMESTAMPTZ DEFAULT NOW(),
          UNIQUE (country_name, region)
      );

      Here are 3 example rows showing the exact format:

      INSERT INTO silver.trade_country_reference
      (country_code, country_name, country_name_alt, iso2_code, iso3_code, region, region_sort_order, country_sort_order, spreadsheet_row, is_regional_total, is_active, notes)
      VALUES
      ('EU27', 'EUROPEAN UNION-27', NULL, NULL, NULL, 'EU27', 1, 0, NULL, TRUE, TRUE, 'Regional total'),
      ('4280', 'GERMANY', 'Germany', 'DE', 'DEU', 'EU27', 1, 11, NULL, FALSE, TRUE, NULL),
      ('4271', 'FRANCE', 'France', 'FR', 'FRA', 'EU27', 1, 10, NULL, FALSE, TRUE, NULL)
      ON CONFLICT (country_name, region) DO UPDATE SET
          country_name_alt = EXCLUDED.country_name_alt,
          iso2_code = EXCLUDED.iso2_code,
          iso3_code = EXCLUDED.iso3_code,
          updated_at = NOW();

      Generate INSERT statements for ALL 27 EU member states plus the EU-27 regional total row.
      Region = 'EU27', region_sort_order = 1.
      Assign country_sort_order alphabetically starting at 1 (regional total row gets 0).

      The 27 EU members are: Austria, Belgium, Bulgaria, Croatia, Cyprus, Czech Republic,
      Denmark, Estonia, Finland, France, Germany, Greece, Hungary, Ireland, Italy, Latvia,
      Lithuania, Luxembourg, Malta, Netherlands, Poland, Portugal, Romania, Slovakia,
      Slovenia, Spain, Sweden.

      For country_name_alt (FAS PSD name), most EU countries use the same English name.
      Use Census Bureau codes where known (e.g., Austria=4031, Belgium=4211, Denmark=4091,
      Finland=4011, France=4271, Germany=4280, Greece=4841, Hungary=4371, Ireland=4190,
      Italy=4759, Netherlands=4210, Poland=4550, Portugal=4710, Romania=4880, Spain=4700,
      Sweden=4010). For others, leave country_code as NULL with a comment.

      Output ONLY SQL.
    validation:
      must_contain: ["EUROPEAN UNION-27", "GERMANY", "FRANCE", "POLAND", "SWEDEN", "EU27", "iso2_code", "iso3_code"]
      must_not_contain: ["```", "Here is", "Note:"]
      min_length: 1500

