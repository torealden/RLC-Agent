# ============================================================================
# Balance Sheet Workbook Master List
# ============================================================================
# Defines every spreadsheet file we need to create, organized by commodity
# complex. Each workbook contains balance sheets for the seed + products
# for all major countries.
#
# Modeled after: us_soy_complex_trade.xlsm + us_soybean_complex_bal_sheets.xlsx
#
# MY start months determine column ordering and formula offsets:
#   Sep = corn, soybeans, sorghum, barley
#   Jul = wheat
#   Oct = protein meals, vegetable oils
#   Aug = cotton, rice
# ============================================================================

workbooks:

  # ══════════════════════════════════════════════════════════════════
