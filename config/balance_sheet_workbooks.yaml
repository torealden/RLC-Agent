  us_soybean_complex:
    filename: "us_soybean_complex_bal_sheets.xlsx"
    status: EXISTS  # Template already built
    commodities: [soybeans, soybean_oil, soybean_meal]
    country: US
    my_start: {soybeans: 9, soybean_oil: 10, soybean_meal: 10}
    trade_file: "us_soy_complex_trade.xlsm"
