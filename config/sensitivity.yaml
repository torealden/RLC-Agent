# =============================================================================
# RLC-Agent Sensitivity Configuration
# =============================================================================
# Controls model routing based on data sensitivity level.
# Sensitivity 0-1: cloud models allowed. Sensitivity 2+: local only.
#
# Levels:
#   0 = public       (government data, open APIs)
#   1 = licensed      (paid data feeds with redistribution limits)
#   2 = internal      (internal analysis, proprietary blends)
#   3 = proprietary   (client deliverables, consulting work)
#   4 = restricted    (embargoed data, pre-release)
# =============================================================================

sensitivity_levels:
  0:
    name: public
    description: Government and open-source data
    cloud_allowed: true
  1:
    name: licensed
    description: Paid data feeds with redistribution limits
    cloud_allowed: true
  2:
    name: internal
    description: Internal analysis and proprietary blends
    cloud_allowed: false
  3:
    name: proprietary
    description: Client deliverables and consulting work
    cloud_allowed: false
  4:
    name: restricted
    description: Embargoed or pre-release data
    cloud_allowed: false

# ---------------------------------------------------------------------------
# Default sensitivity for each data source collector key
# ---------------------------------------------------------------------------
data_source_defaults:
